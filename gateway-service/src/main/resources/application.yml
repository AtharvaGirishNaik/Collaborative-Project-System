server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # Auth Service Route
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
          
        # Collaboration Service Routes (HTTP + WebSocket)
        - id: collab-http
          uri: http://collaboration-service:8082
          predicates:
            - Path=/api/collab/**
          filters:
            - StripPrefix=2
            
        - id: collab-websocket
          uri: ws://collaboration-service:8082
          predicates:
            - Path=/collab/**
          filters:
            - StripPrefix=1

# JWT Configuration
jwt:
  secret: mySecretKey123
  header: Authorization
  prefix: Bearer 

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
