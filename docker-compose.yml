version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: collab_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./gateway-service
    ports:
      - "8080:8080"              # ← MAIN ENTRY
    depends_on:
      - collaboration-service

  collaboration-service:           # ← ONE SERVICE FOR AUTH + WEBSOCKET
    build: ./collaboration-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/collab_db
      - SPRING_DATASOURCE_USERNAME=abd
      - SPRING_DATASOURCE_PASSWORD=abc
      - REDIS_HOST=redis
      - JWT_SECRET=abc

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
