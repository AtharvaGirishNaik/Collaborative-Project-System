version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: collab_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gateway:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - collaboration-service
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - COLLAB_SERVICE_URL=http://collaboration-service:8082

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgres://postgres:5432/collab_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password

  collaboration-service:
    build: ./collaboration-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgres://postgres:5432/collab_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - REDIS_HOST=redis
      - JWT_SECRET=mySecretKey123

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
